baseURL = 'https://zhanmmeng.github.io/endless/'
languageCode = 'zh-cn'
title = '我的博客'

theme = 'hugo-book'

# 启用 Git 信息跟踪（显示最后修改时间）
enableGitInfo = true

[params]
  # 默认主题: light 或 dark 或 auto
  BookTheme = 'auto'
  # 显示最后修改时间
  BookLastModify = true
  # 显示阅读时间
  BookShowReadingTime = true
  # 显示文章目录
  BookShowToC = true
  # 显示面包屑导航
  BookShowBreadCrumbs = true
  # 显示代码复制按钮
  BookShowCodeCopyButtons = true
  # 内容目录（'*' 表示显示所有内容，或者指定具体目录如 'posts'）
  BookSection = '*'
  # 启用搜索
  BookSearch = true
  # 日期格式（用于显示最后修改时间）
  BookDateFormat = '2006年1月2日'
  # Git 仓库地址（用于生成提交链接）
  BookRepo = 'https://github.com/zhanmmeng/endless'
  # 启用最后修改时间显示（需要 enableGitInfo = true）
  BookLastChangeLink = '{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}'

[menu]
# [[menu.before]]
[[menu.after]]
  name = "Github"
  url = "https://github.com/zhanmmeng"
  weight = 10

[markup.goldmark.renderer]
  # 允许 HTML 标签
  unsafe = true